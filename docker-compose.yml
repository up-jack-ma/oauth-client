version: '3.8'

services:
  oauth-client:
    build: .
    container_name: oauth-client
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./oauth-data:/app/data
    environment:
      - PORT=8080
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - GIN_MODE=release

volumes:
  oauth-data:
